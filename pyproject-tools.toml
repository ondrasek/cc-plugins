# Tool configuration sections for pyproject.toml
# These get merged into the target project's pyproject.toml by apply.sh.
# Only [tool.*] sections and [dependency-groups] dev — no project metadata.

[dependency-groups]
dev = [
    "pre-commit",
    "pytest",
    "pytest-cov",
    "ruff",
    "pyright>=1.1",
    "bandit>=1.8",
    "vulture>=2.14",
    "xenon>=0.9",
    "refurb>=2.0",
    "deptry>=0.20",
    "import-linter>=2.0",
    "codespell>=2.3",
    "semgrep>=1.50",
    "ty>=0.0.1a1",
    "interrogate>=1.7",
    "mypy>=1.15",
]

[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "SIM",    # flake8-simplify
]

[tool.ruff.format]
quote-style = "double"

[tool.bandit]
exclude_dirs = ["tests", ".venv"]
skips = ["B101"]  # Allow assert in source code (used for internal invariants)

[tool.importlinter]
root_packages = ["your_package"]

# Example import-linter contract — customize for your architecture:
# [[tool.importlinter.contracts]]
# name = "Module A must not import module B"
# type = "forbidden"
# source_modules = ["your_package.module_a"]
# forbidden_modules = ["your_package.module_b"]

[tool.codespell]
skip = ".venv,*.pyc,__pycache__,.git"

[tool.deptry]
ignore = ["DEP003"]  # Self-imports are not transitive deps

[tool.xenon]
# Thresholds: A (best) through F (worst). Production standard per McCabe/NIST.
# max-absolute B = no function above CC 10
# max-modules A = module averages must be in 1-5 range
# max-average A = project-wide average must be in 1-5 range
max-absolute = "B"
max-modules = "A"
max-average = "A"

[tool.interrogate]
exclude = ["tests", "docs"]
ignore-init-method = true
ignore-init-module = true
ignore-magic = true
ignore-semiprivate = true
ignore-private = true
fail-under = 70
verbose = 0

[tool.ty.environment]
python-version = "3.13"

[tool.ty.src]
exclude = ["tests/**", "**/__pycache__"]

[tool.mypy]
python_version = "3.13"
strict = true
warn_return_any = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

[tool.pytest.ini_options]
testpaths = ["tests"]
norecursedirs = [".venv", "dist", "build"]
