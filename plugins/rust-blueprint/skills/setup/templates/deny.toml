# deny.toml
# Generated by rust-blueprint setup skill
#
# cargo-deny configuration for security auditing, license compliance,
# and dependency hygiene.
#
# THIS IS AN ANNOTATED EXAMPLE. The setup skill should adjust the license
# allowlist, banned crates, and advisory settings based on the project's
# requirements (corporate vs open source, WASM usage, etc.).

[advisories]
# Deny crates with known security vulnerabilities
vulnerability = "deny"
# Warn on unmaintained crates
unmaintained = "warn"
# Warn on crates that have been yanked
yanked = "warn"
# Warn on crates with pending advisories
notice = "warn"

[licenses]
# Deny unlicensed crates
unlicensed = "deny"
# Allow commonly-used permissive licenses
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "CC0-1.0",
    "OpenSSL",
]
# Confidence threshold for license detection
confidence-threshold = 0.8

[bans]
# Warn on multiple versions of the same crate (common in Rust ecosystem)
multiple-versions = "warn"
# Deny wildcard dependencies in published crates
wildcards = "deny"
# Allow specific duplicate crates that are known to be safe
# allow-wildcard-paths = true

[sources]
# Require all crates to come from crates.io
unknown-registry = "deny"
unknown-git = "deny"
# Allow specific git sources if needed
# allow-git = []
