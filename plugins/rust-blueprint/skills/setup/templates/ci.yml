# GitHub Actions CI pipeline template
# Generated by rust-blueprint setup skill
#
# THIS IS AN ANNOTATED EXAMPLE. The specific tools in each job are current
# best-in-class choices for Rust. The setup skill should substitute researched
# tools for each role. What matters is the STRUCTURE:
#   - Separate jobs per quality dimension (test, lint, security, deadcode, wasm)
#   - Each job: checkout → setup Rust → install tools → run checks
#   - [check:*] markers for tool-specific steps
#   - Coverage upload on PRs
#
# TEMPLATE VARIABLES:
#   ${MSRV}                — minimum supported Rust version (e.g., "1.85.0")
#   ${RUST_EDITION}        — Rust edition (e.g., "2024")
#   ${WORKSPACE_FLAG}      — workspace flag (e.g., "--workspace" or empty)
#   ${COVERAGE_THRESHOLD}  — minimum coverage percentage (e.g., 75)
#   ${WASM_TARGETS}        — WASM target triple (e.g., "wasm32-unknown-unknown")

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-llvm-cov
      - run: cargo test ${WORKSPACE_FLAG}
      - run: cargo llvm-cov ${WORKSPACE_FLAG} --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
        if: github.event_name == 'pull_request'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy ${WORKSPACE_FLAG} -- -D warnings
      - run: cargo fmt ${WORKSPACE_FLAG} --check

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit cargo-deny
      - run: cargo audit
      - run: cargo deny check

  deadcode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-machete
      - run: cargo machete

  # Dimension 9: Version Discipline
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          VERSION=$(${VERSION_EXTRACT_CMD})
          echo "Detected version: $VERSION"
          echo "$VERSION" | grep -qE '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-([0-9A-Za-z-]+\.)*[0-9A-Za-z-]+)?(\+([0-9A-Za-z-]+\.)*[0-9A-Za-z-]+)?$' || { echo "ERROR: Version '$VERSION' is not valid semver 2.0"; exit 1; }
          echo "Version is valid semver 2.0"

