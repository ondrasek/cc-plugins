# GitHub Actions workflow templates for Obsidian vaults
# Generated by obsidian-blueprint setup skill
#
# THIS IS AN ANNOTATED STRUCTURAL EXAMPLE.
# The setup skill generates specific workflows based on vault analysis.
# This file shows the GitHub Actions PATTERNS for Obsidian vault workflows.
# It is NOT meant to be copied verbatim — the setup skill selects and
# customizes the relevant pattern based on the vault's needs.
#
# TEMPLATE VARIABLES:
#   ${WORKFLOW_NAME}     — workflow name
#   ${TRIGGER_EVENT}     — trigger (push, pull_request, issues, schedule)
#   ${TRIGGER_CONDITION} — condition (branches, labels, cron)
#   ${REQUIRED_FIELDS}   — comma-separated required frontmatter fields
#   ${VAULT_ROOT}        — vault root directory (usually ".")

# ============================================================================
# PATTERN 1: Quality enforcement on pull request
# Runs the quality gate checks when PRs are opened or updated.
# ============================================================================

name: ${WORKFLOW_NAME}

on:
  ${TRIGGER_EVENT}:
    ${TRIGGER_CONDITION}: [main]

jobs:
  vault-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Install spell checker
        run: pip install codespell

      - name: Check frontmatter
        run: |
          ERRORS=""
          IFS="," read -ra REQUIRED <<< "${REQUIRED_FIELDS}"
          while IFS= read -r -d '' file; do
            FIRST_LINE=$(head -1 "$file")
            if [[ "$FIRST_LINE" != "---" ]]; then
              ERRORS="${ERRORS}${file}: missing frontmatter\n"
              continue
            fi
            CLOSING_REL=$(tail -n +2 "$file" | grep -n '^---$' | head -1 | cut -d: -f1)
            if [[ -z "$CLOSING_REL" ]]; then
              ERRORS="${ERRORS}${file}: unclosed frontmatter\n"
              continue
            fi
            CLOSING=$((CLOSING_REL + 1))  # adjust for tail -n +2 offset
            FM=$(sed -n "2,$((CLOSING - 1))p" "$file")
            if ! echo "$FM" | yq '.' > /dev/null 2>&1; then
              ERRORS="${ERRORS}${file}: invalid YAML in frontmatter\n"
              continue
            fi
            for req in "${REQUIRED[@]}"; do
              req=$(echo "$req" | xargs)
              [[ -z "$req" ]] && continue
              HAS=$(echo "$FM" | yq "has(\"$req\")" 2>/dev/null)
              if [[ "$HAS" != "true" ]]; then
                ERRORS="${ERRORS}${file}: missing required field \"${req}\"\n"
              fi
            done
          done < <(find '${VAULT_ROOT}' -name '*.md' -not -path '*/.obsidian/*' -not -path '*/.git/*' -print0)
          if [[ -n "$ERRORS" ]]; then
            echo -e "$ERRORS"
            exit 1
          fi
          echo "All notes have valid frontmatter"

      - name: Check broken wikilinks
        run: |
          # Build note index
          declare -A NOTES
          while IFS= read -r -d '' file; do
            NAME=$(basename "$file" .md)
            NOTES["$NAME"]=1
          done < <(find '${VAULT_ROOT}' -name '*.md' -not -path '*/.obsidian/*' -not -path '*/.git/*' -print0)
          # Check wikilinks
          ERRORS=""
          LINK_TARGETS=$(grep -roh '\[\[[^]|#]*' '${VAULT_ROOT}' --include='*.md' 2>/dev/null | sed 's/\[\[//' | sed 's|.*/||')
          while IFS= read -r -d '' file; do
            while IFS= read -r line; do
              while [[ "$line" =~ \[\[([^\]|#]+) ]]; do
                TARGET="${BASH_REMATCH[1]}"
                line="${line#*]]}"
                [[ "$TARGET" == http* ]] && continue
                [[ "${TARGET##*/}" == *.* ]] && continue
                LINK_NAME=$(echo "${TARGET##*/}" | xargs)
                if [[ -z "${NOTES[$LINK_NAME]+x}" ]]; then
                  ERRORS="${ERRORS}${file}: broken link [[${TARGET}]]\n"
                fi
              done
            done < "$file"
          done < <(find '${VAULT_ROOT}' -name '*.md' -not -path '*/.obsidian/*' -not -path '*/.git/*' -print0)
          if [[ -n "$ERRORS" ]]; then
            echo -e "$ERRORS"
            exit 1
          fi
          echo "All wikilinks resolve correctly"

      - name: Check spelling
        run: codespell --quiet-level=2 --skip=".obsidian,.git,*.json" ${VAULT_ROOT}

