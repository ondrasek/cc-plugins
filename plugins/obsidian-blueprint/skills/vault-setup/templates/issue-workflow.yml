# Generated by obsidian-blueprint setup skill
#
# THIS IS AN ANNOTATED STRUCTURAL EXAMPLE.
# The setup skill generates specific workflows based on vault analysis.
# This file shows the GitHub Actions PATTERNS for Obsidian vault workflows.
# It is NOT meant to be copied verbatim — the setup skill selects and
# customizes the relevant pattern based on the vault's needs.
#
# TEMPLATE VARIABLES:
#   ${WORKFLOW_NAME}     — workflow name
#   ${TRIGGER_EVENT}     — trigger (push, pull_request, issues, schedule)
#   ${TRIGGER_CONDITION} — condition (branches, labels, cron)
#   ${REQUIRED_FIELDS}   — comma-separated required frontmatter fields
#   ${VAULT_ROOT}        — vault root directory (usually ".")

# ============================================================================
# PATTERN 1: Quality enforcement on pull request
# Runs the quality gate checks when PRs are opened or updated.
# ============================================================================

name: ${WORKFLOW_NAME}

on:
  ${TRIGGER_EVENT}:
    ${TRIGGER_CONDITION}: [main]

jobs:
  vault-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (for frontmatter/link checks)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install spell checker
        run: pip install codespell

      - name: Check frontmatter
        run: |
          python3 -c "
          import os, re, sys
          required = [f.strip() for f in '${REQUIRED_FIELDS}'.split(',')]
          errors = []
          date_re = re.compile(r'^\d{4}-\d{2}-\d{2}$')
          for root, dirs, files in os.walk('${VAULT_ROOT}'):
              dirs[:] = [d for d in dirs if not d.startswith('.')]
              for f in files:
                  if not f.endswith('.md'): continue
                  path = os.path.join(root, f)
                  with open(path, 'r', errors='replace') as fh:
                      content = fh.read()
                  if not content.startswith('---'):
                      errors.append(f'{path}: missing frontmatter')
                      continue
                  end = content.find('---', 3)
                  if end == -1:
                      errors.append(f'{path}: unclosed frontmatter')
                      continue
                  fm = content[3:end]
                  fields = {}
                  for line in fm.split('\n'):
                      if ':' in line:
                          k, v = line.split(':', 1)
                          fields[k.strip()] = v.strip()
                  for req in required:
                      if req and req not in fields:
                          errors.append(f'{path}: missing \"{req}\"')
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print(f'All notes have valid frontmatter')
          "

      - name: Check broken wikilinks
        run: |
          python3 -c "
          import os, re, sys
          notes = set()
          for root, dirs, files in os.walk('${VAULT_ROOT}'):
              dirs[:] = [d for d in dirs if not d.startswith('.')]
              for f in files:
                  if f.endswith('.md'):
                      notes.add(os.path.splitext(f)[0])
          wikilink_re = re.compile(r'\[\[([^\]|#]+?)(?:#[^\]]*)?(?:\|[^\]]+)?\]\]')
          errors = []
          for root, dirs, files in os.walk('${VAULT_ROOT}'):
              dirs[:] = [d for d in dirs if not d.startswith('.')]
              for f in files:
                  if not f.endswith('.md'): continue
                  path = os.path.join(root, f)
                  with open(path, 'r', errors='replace') as fh:
                      content = fh.read()
                  for m in wikilink_re.finditer(content):
                      target = m.group(1).strip().split('/')[-1]
                      if not target.startswith('http') and target not in notes:
                          errors.append(f'{path}: broken link [[{m.group(1).strip()}]]')
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print(f'All wikilinks resolve correctly')
          "

      - name: Check spelling
        run: codespell --quiet-level=2 --skip=".obsidian,.git,*.json" ${VAULT_ROOT}

