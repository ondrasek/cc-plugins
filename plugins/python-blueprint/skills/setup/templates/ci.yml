# GitHub Actions CI pipeline template
# Generated by python-blueprint setup skill
#
# THIS IS AN ANNOTATED EXAMPLE. The specific tools in each job (ruff, pyright,
# bandit, vulture) are current choices. The setup skill should substitute
# researched tools for each role. What matters is the STRUCTURE:
#   - Separate jobs per quality dimension (test, lint, typecheck, security, deadcode)
#   - Each job: checkout → setup → install → run tool
#   - [setup:uv] markers for package-manager-specific setup steps
#   - Coverage upload on PRs
#
# TEMPLATE VARIABLES:
#   ${PYTHON_VERSION}       — Python version (e.g., "3.13")
#   ${PACKAGE_MANAGER}      — package manager name (e.g., "uv")
#   ${SOURCE_DIR}           — source directory (e.g., "src/")
#   ${SETUP_UV_ACTION}      — UV setup action (included when using uv)
#   ${INSTALL_COMMAND}      — dependency install command
#   ${RUN_PREFIX}           — command runner prefix

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # [setup:uv]
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "${PYTHON_VERSION}"
      # [/setup:uv]
      - run: ${INSTALL_COMMAND}
      - run: ${RUN_PREFIX} pytest --cov --cov-report=term-missing --cov-report=xml
      - uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
        if: github.event_name == 'pull_request'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # [setup:uv]
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "${PYTHON_VERSION}"
      # [/setup:uv]
      - run: ${INSTALL_COMMAND}
      - run: ${RUN_PREFIX} ruff check .
      - run: ${RUN_PREFIX} ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # [setup:uv]
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "${PYTHON_VERSION}"
      # [/setup:uv]
      - run: ${INSTALL_COMMAND}
      - run: ${RUN_PREFIX} pyright ${SOURCE_DIR}

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # [setup:uv]
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "${PYTHON_VERSION}"
      # [/setup:uv]
      - run: ${INSTALL_COMMAND}
      - run: ${RUN_PREFIX} bandit -r ${SOURCE_DIR} -ll

  deadcode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # [setup:uv]
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "${PYTHON_VERSION}"
      # [/setup:uv]
      - run: ${INSTALL_COMMAND}
      - run: ${RUN_PREFIX} vulture ${SOURCE_DIR} --min-confidence 80
