# Pre-commit config template — generated by python-blueprint setup skill
#
# THIS IS AN ANNOTATED EXAMPLE. The specific hooks (ruff, ruff-format) are
# current choices. The setup skill should add pre-commit hooks for whichever
# linter/formatter was chosen for the project.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.4
    hooks:
      - id: ruff
      - id: ruff-format
