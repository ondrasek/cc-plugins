# CI pipeline for .NET quality methodology
# Generated by dotnet-blueprint setup skill
#
# THIS IS AN ANNOTATED EXAMPLE. The setup skill should adapt this template
# based on the project's .NET version, solution structure, and enabled
# dimensions. What matters is the PATTERN:
#   - One job per quality dimension
#   - Jobs run in parallel for speed
#   - Fail-fast on test/build failures
#
# TEMPLATE VARIABLES (replaced by setup skill):
#   ${DOTNET_VERSION}     — .NET SDK version (e.g., "9.0.x")
#   ${SOLUTION_FILE}      — solution file path (e.g., "MyApp.sln")
#   ${SOURCE_PROJECTS}    — source project paths for coverage
#   ${TEST_PROJECTS}      — test project paths
#   ${COVERAGE_THRESHOLD} — minimum coverage percentage (e.g., 80)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # Dimension 1: Testing & Coverage
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '${DOTNET_VERSION}'
      - run: dotnet restore ${SOLUTION_FILE}
      - run: dotnet test ${SOLUTION_FILE} --no-restore --collect:"XPlat Code Coverage" --verbosity normal -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
      # Coverage threshold enforcement (setup skill adds specific tool)
      # - run: dotnet tool install --global dotnet-reportgenerator-globaltool
      # - run: reportgenerator -reports:"**/coverage.cobertura.xml" -targetdir:coverage -reporttypes:TextSummary
      # - run: cat coverage/Summary.txt

  # Dimension 2: Linting & Formatting + Dimension 3: Type Safety
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '${DOTNET_VERSION}'
      - run: dotnet restore ${SOLUTION_FILE}
      - run: dotnet format ${SOLUTION_FILE} --verify-no-changes --verbosity diagnostic
      - run: dotnet build ${SOLUTION_FILE} --no-restore -warnaserror --verbosity quiet

  # Dimension 4: Security Analysis
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '${DOTNET_VERSION}'
      - run: dotnet restore ${SOLUTION_FILE}
      - run: dotnet list ${SOLUTION_FILE} package --vulnerable --include-transitive
      # Security analyzer build (setup skill adds specific analyzer packages)
      # - run: dotnet build ${SOLUTION_FILE} --no-restore -warnaserror --verbosity quiet

  # Dimension 9: Version Discipline
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          VERSION=$(${VERSION_EXTRACT_CMD})
          echo "Detected version: $VERSION"
          echo "$VERSION" | grep -qE '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-([0-9A-Za-z-]+\.)*[0-9A-Za-z-]+)?(\+([0-9A-Za-z-]+\.)*[0-9A-Za-z-]+)?$' || { echo "ERROR: Version '$VERSION' is not valid semver 2.0"; exit 1; }
          echo "Version is valid semver 2.0"
