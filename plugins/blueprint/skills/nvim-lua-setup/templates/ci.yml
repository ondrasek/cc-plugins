# GitHub Actions CI pipeline template for Neovim Lua plugins
# Generated by nvim-lua-blueprint setup skill
#
# THIS IS AN ANNOTATED EXAMPLE. The specific tools in each job are current
# best-in-class choices for Neovim Lua. The setup skill should substitute
# researched tools for each role. What matters is the STRUCTURE:
#   - Separate jobs per quality dimension (test, lint, typecheck, version)
#   - Test job uses Neovim version matrix
#   - [check:*] markers for tool-specific steps
#
# TEMPLATE VARIABLES:
#   ${SOURCE_DIR}              — main source directory (e.g., "lua/")
#   ${TEST_DIR}                — test directory (e.g., "tests/")
#   ${TEST_COMMAND}            — test invocation command
#   ${NEOVIM_VERSIONS}         — Neovim version matrix (e.g., [stable, nightly])
#   ${VERSION_EXTRACT_CMD}     — command to extract version

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        neovim: ${NEOVIM_VERSIONS}
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim }}
      # [check:plenary] — adjust for detected test framework
      - uses: actions/checkout@v4
        with:
          repository: nvim-lua/plenary.nvim
          path: .deps/plenary.nvim
      - run: |
          ${TEST_COMMAND}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # [check:selene]
      - uses: NTBBloodbath/selene-action@v2
        with:
          args: ${SOURCE_DIR}
      # [check:stylua]
      - uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check ${SOURCE_DIR}

  # [job:typecheck] — uncomment if lua-language-server check mode is enabled
  # typecheck:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - run: |
  #         brew install lua-language-server
  #         lua-language-server --check ${SOURCE_DIR}

  # Dimension 9: Version Discipline
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          VERSION=$(${VERSION_EXTRACT_CMD})
          echo "Detected version: $VERSION"
          echo "$VERSION" | grep -qE '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-([0-9A-Za-z-]+\.)*[0-9A-Za-z-]+)?(\+([0-9A-Za-z-]+\.)*[0-9A-Za-z-]+)?$' || { echo "ERROR: Version '$VERSION' is not valid semver 2.0"; exit 1; }
          echo "Version is valid semver 2.0"
