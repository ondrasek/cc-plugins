# clippy.toml
# Generated by rust-blueprint setup skill
#
# TEMPLATE VARIABLES:
#   ${MSRV}                   — minimum supported Rust version (e.g., "1.85.0")
#   ${COMPLEXITY_THRESHOLD}   — max cognitive complexity (e.g., 25)

# Minimum supported Rust version — clippy uses this to avoid suggesting
# features that aren't available in the project's target Rust version.
msrv = "${MSRV}"

# Maximum cognitive complexity per function before clippy warns.
# Default clippy value is 25. Tighten for mature projects.
cognitive-complexity-threshold = ${COMPLEXITY_THRESHOLD}
