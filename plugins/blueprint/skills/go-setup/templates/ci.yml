# GitHub Actions CI pipeline template
# Generated by go-blueprint setup skill
#
# THIS IS AN ANNOTATED EXAMPLE. The specific tools in each job are current
# best-in-class choices for Go. The setup skill should substitute researched
# tools for each role. What matters is the STRUCTURE:
#   - Separate jobs per quality dimension (test, lint, security, version)
#   - Note: lint job covers 6 dimensions via golangci-lint
#   - Each job: checkout → setup Go → install tools → run checks
#   - [check:*] markers for tool-specific steps
#
# TEMPLATE VARIABLES:
#   ${GO_VERSION}              — Go version (e.g., "1.26")
#   ${GOLANGCI_LINT_VERSION}   — golangci-lint version (e.g., "v2.11.3")
#
# TOOL DIRECTIVES (Go 1.24+):
#   When the project uses go.mod tool directives, replace 'go install ...@latest'
#   with 'go tool <name>' invocations. The setup skill should detect tool
#   directives and substitute accordingly. The template below uses go install
#   as the default; comments show the go tool alternative.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "${GO_VERSION}"
      - name: Install test tools
        # When using go.mod tool directives (Go 1.24+), remove this step
        # entirely — tools are resolved automatically via 'go tool'.
        run: |
          go install gotest.tools/gotestsum@latest
          go install github.com/vladopajic/go-test-coverage/v2@latest
      - name: Run tests with coverage
        # -race requires CGO and a C compiler. CGO_ENABLED is set to 1 here
        # explicitly so the race detector works. Other jobs disable CGO where
        # it is not needed.
        # With tool directives, use: go tool gotestsum ...
        env:
          CGO_ENABLED: "1"
        run: |
          gotestsum --format standard-verbose --junitfile report.xml -- \
            -race -coverpkg=./... -coverprofile=coverage.out -covermode=atomic -count=1 -shuffle=on ./...
      - name: Check coverage threshold
        # With tool directives, use: go tool go-test-coverage ...
        run: go-test-coverage --config=.testcoverage.yml

  lint:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "${GO_VERSION}"
      - uses: golangci/golangci-lint-action@v8
        with:
          version: "${GOLANGCI_LINT_VERSION}"
      - name: Check formatting
        run: |
          OUTPUT=$(golangci-lint fmt --diff ./... 2>&1)
          if [ -n "$OUTPUT" ]; then
            echo "$OUTPUT"
            exit 1
          fi

  security:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "${GO_VERSION}"
      - name: Install govulncheck
        # With tool directives, use: go tool govulncheck ...
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run vulnerability check
        run: govulncheck ./...
      - name: Verify module integrity
        run: go mod verify

  # Dimension 9: Version Discipline
  # Include this job when Dimension 9 is activated at level 2 or 3.
  # Remove the entire job block when Dimension 9 is skipped.
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate semver
        run: |
          VERSION=$(${VERSION_EXTRACT_CMD})
          echo "Detected version: $VERSION"
          echo "$VERSION" | grep -qE '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-([0-9A-Za-z-]+\.)*[0-9A-Za-z-]+)?(\+([0-9A-Za-z-]+\.)*[0-9A-Za-z-]+)?$' || { echo "ERROR: Version '$VERSION' is not valid semver 2.0"; exit 1; }
          echo "Version is valid semver 2.0"
