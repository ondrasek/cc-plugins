# golangci-lint v2 configuration template
# Generated by go-blueprint setup skill
#
# THIS IS AN ANNOTATED EXAMPLE. The setup skill should customize linter
# selection, thresholds, and exclusions based on project analysis.
# What matters is the STRUCTURE:
#   - version: "2" (required for golangci-lint v2)
#   - linters with default: standard + additional enables
#   - formatters in separate section
#   - exclusions for test files, generated code
#   - severity classification
#
# TEMPLATE VARIABLES:
#   ${CYCLOMATIC_THRESHOLD}    — max cyclomatic complexity (e.g., 15)
#   ${COGNITIVE_THRESHOLD}     — max cognitive complexity (e.g., 20)
#   ${FUNLEN_LINES}            — max function length in lines (e.g., 80)
#   ${FUNLEN_STATEMENTS}       — max function statements (e.g., 50)
#   ${MODULE_PATH}             — Go module path for depguard/gci

# yaml-language-server: $schema=https://golangci-lint.run/jsonschema/golangci.jsonschema.json
version: "2"

run:
  timeout: 5m
  relative-path-mode: gomod
  tests: true
  modules-download-mode: readonly

linters:
  default: standard  # govet, errcheck, staticcheck, unused, ineffassign, copyloopvar
  enable:
    # Linting & style (Dimension 2)
    - revive
    - misspell
    - dupword
    - nolintlint
    - predeclared
    - gocritic
    # Type safety (Dimension 3)
    - exhaustive
    - nilerr
    - errorlint
    - forcetypeassert
    - bodyclose
    - noctx
    - sqlclosecheck
    - gosec
    # Complexity (Dimension 5)
    - gocyclo
    - gocognit
    - funlen
    - nestif
    # Dead code & modernization (Dimension 6)
    - unparam
    - wastedassign
    - modernize
    - exptostd
    - intrange
    # Documentation (Dimension 7)
    - godoclint
    - godot
    # Architecture & imports (Dimension 8)
    - depguard
    - gomodguard
    - gomoddirectives
    - importas
    # Additional
    - unconvert
    - usestdlibvars
    - usetesting
    - testifylint
    - thelper
    - perfsprint
    - dupl
    - sloglint

  settings:
    revive:
      enable-default-rules: true
      rules:
        - name: exported
          arguments: [checkPrivateReceivers, disableStutterCheck]
        - name: unused-parameter
          arguments:
            - allowRegex: "^_"
        - name: package-comments
        - name: context-as-argument
        - name: error-return
        - name: error-strings
        - name: indent-error-flow
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id

    staticcheck:
      checks: ["all"]

    govet:
      enable-all: true
      disable: [fieldalignment]

    exhaustive:
      default-signifies-exhaustive: true

    errcheck:
      check-type-assertions: true

    errorlint:
      errorf: true
      asserts: true
      comparison: true

    gocyclo:
      min-complexity: ${CYCLOMATIC_THRESHOLD}

    gocognit:
      min-complexity: ${COGNITIVE_THRESHOLD}

    funlen:
      lines: ${FUNLEN_LINES}
      statements: ${FUNLEN_STATEMENTS}
      ignore-comments: true

    nestif:
      min-complexity: 5

    gosec:
      excludes: [G101]

    depguard:
      rules:
        main:
          deny:
            - pkg: "math/rand$"
              desc: "Use math/rand/v2 or crypto/rand"
            - pkg: "io/ioutil"
              desc: "Deprecated since Go 1.16"
            - pkg: "github.com/pkg/errors"
              desc: "Use fmt.Errorf with %w"

    misspell:
      locale: US

    dupl:
      threshold: 150

    godot:
      scope: declarations
      period: true

    godoclint:
      default: basic
      enable: [require-doc]

    testifylint:
      enable-all: true

    perfsprint:
      int-conversion: true
      err-error: true

  exclusions:
    generated: lax
    warn-unused: true
    presets:
      - std-error-handling
      - common-false-positives
    rules:
      - path: "_test\\.go"
        linters: [gocyclo, gocognit, funlen, dupl, gosec, nestif, unparam]
    paths:
      - ".*\\.pb\\.go$"
      - ".*_mock\\.go$"
      - "vendor/"

formatters:
  enable:
    - gofumpt
    - goimports
    - gci
  settings:
    gci:
      sections: [standard, default, localmodule]
      custom-order: true
  exclusions:
    generated: lax
    paths: [".*\\.pb\\.go$", "vendor/"]

output:
  formats:
    text:
      print-linter-name: true
      colors: true
  sort-order: [linter, severity, file]
  show-stats: true

severity:
  default: warning
  rules:
    - linters: [gosec]
      severity: error
    - linters: [govet, staticcheck]
      severity: error
    - linters: [misspell, godot, dupword]
      severity: info
