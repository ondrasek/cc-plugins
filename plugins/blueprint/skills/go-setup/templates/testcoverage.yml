# go-test-coverage configuration template
# Generated by go-blueprint setup skill
#
# TEMPLATE VARIABLES:
#   ${COVERAGE_THRESHOLD_FILE}    — per-file minimum (e.g., 70)
#   ${COVERAGE_THRESHOLD_PACKAGE} — per-package minimum (e.g., 80)
#   ${COVERAGE_THRESHOLD_TOTAL}   — project-wide minimum (e.g., 80)

profile: coverage.out
threshold:
  file: ${COVERAGE_THRESHOLD_FILE}
  package: ${COVERAGE_THRESHOLD_PACKAGE}
  total: ${COVERAGE_THRESHOLD_TOTAL}
exclude:
  paths:
    - \.pb\.go$
    - _mock\.go$
    - ^vendor/
    - ^cmd/.*/main\.go$
